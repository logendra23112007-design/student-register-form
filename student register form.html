<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bitcount+Single:wght@100..900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />


</head>
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"Bitcount Single", system-ui;
}

body{
    background:linear-gradient(135deg,#00efc3,#454e76);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:30px;
}

.container{
    width:100%;
    max-width:1100px;
    display:flex;
    flex-direction:column;
    justify-content:space-between;
    align-items:center;
    gap:30px;
}

.form-box{
    flex:1;
    background:#fff;
    padding:35px;
    border-radius:15px;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

.form-box h1{
    text-align:center;
    color:#1976d2;
    margin-bottom:25px;
    font-size:28px;
}

label{
    display:block;
    margin-bottom:6px;
    font-weight:bold;
    color:#333;
}

input[type="text"],
input[type="email"],
input[type="password"],
input[type="date"],
input[type="number"],
input[type="file"],
select,
textarea{
    width:100%;
    padding:12px;
    border:1px solid #ccc;
    border-radius:8px;
    margin-bottom:18px;
    font-size:16px;
    outline:none;
    transition:.3s;
}

input:focus,
select:focus,
textarea:focus{
    border-color:#1976d2;
    box-shadow:0 0 8px rgba(25,118,210,.3);
}

textarea{
    resize:vertical;
    min-height:90px;
}

.radio-group,
.checkbox-group{
    margin-bottom:18px;
}

.radio-group label,
.checkbox-group label{
    display:inline;
    margin-right:15px;
    font-wxxxxxxxxeight:normal;
}

input[type="submit"]{
    width:100%;
    padding:14px;
    background:#1976d2;
    color:white;
    border:none;
    border-radius:8px;
    font-size:18px;
    cursor:pointer;
    transition:.3s;
}

input[type="submit"]:hover{
    background:#0d47a1;
}

.gif-box{
    flex:1;
    display:flex;
    justify-content:center;
    align-items:center;
}

.gif-box img{
    width:100%;
    max-width:450px;
    border-radius:15px;
    box-shadow:0 10px 25px rgba(0,0,0,.25);
}

@media(max-width:900px){
    .container{
        flex-direction:column;
    }

    .gif-box{
        order:-1;
    }

    .gif-box img{
        max-width:300px;
    }
}
</style>
</head>

<body>
    <div class="container">

        <div class="form-box">
            <h1>STUDENT REGISTRATION FORM</h1>
            <form action="student%20detaill.html" method="post">

        <label for="Roll-no">Roll- no:</label>
        <input type="text" id="Roll- no" name="Roll -no" required placeholder="Enter Roll no"><br><br>
     <a href="https://web.whatsapp.com/" target="_blank"> <i class="fa-brands fa-whatsapp"></i></a>
        <label for="name">Name:</label>
        <input type="text" id="name" name="name" required placeholder="Enter Name"><br><br>

        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required placeholder="Enter Email"><br><br>
        <a href="https://www.amazon.com/" target="_blank"> <i class="fa-brands fa-amazon"><</i>i></a>
        <label for="password">Password:</label>
        <input type="password" id="password" name="password" required placeholder="Enter Password"><br><br>
        <a href="https://www.google.com/" target="_blank"> <i class="fa-solid fa-alarm-clock"></i></a>

        <label for="dob">Date of Birth:</label>
        <input type="date" id="dob" name="dob" required><br><br>

        <label for="gender">Gender:</label>
        <input type="radio" id="gender-male" name="gender" value="male" required><br><br>

        <label for="gender-male">Male</label>
        <input type="radio" id="gender-female" name="gender" value="female" required><br><br>

        <label for="female">Female</label><br><br>
        <input type="checkbox" id="subscribe" name="subscribe" value="yes"><br><br>

        <label for="age">Age:</label>
        <input type="number" id="age" name="age" required placeholder="Enter Age"><br><br>

        <label for="department">Department:</label>
        <select id="department" name="department" required>
            <option value="">Select a department</option>
            <option value="CSE">CSE</option>
            <option value="AIDS">AIDS</option>
            <option value="IT">IT</option>
            <option value="Civil">Civil</option>
            <option value="Mechanical">Mechanical</option>
        </select><br><br>

        <label for="course">Course:</label>
        <input course type="text" id="course" name="course" required><br><br>

        <label for="student-photo">Student Photo:</label>
        <input type="file" id="student-photo" name="student-photo" accept="image/*" required><br><br>

        <label for="city">City:</label>
        <input type="text" id="city" name="city" required><br><br>

        <label for="address">Address:</label>
        <textarea id="address" name="address" required></textarea><br><br>

        <label for="subscribe">Subscribe to newsletter</label><br><br>                  
        <input type="submit" value="Submit">    
            </form>
        </div>
        <div class="gif-box" id="gif-box">
            <img src="shinchan.gif" alt="Shinchan GIF">
        </div>
    </div>
</body>
</html>
